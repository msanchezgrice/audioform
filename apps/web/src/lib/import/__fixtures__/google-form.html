<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Google Forms - Event RSVP</title>
  </head>
  <body>
    <form action="https://docs.google.com/forms/d/e/test-form-id/formResponse">
      <div data-provider="google-forms">
        <div role="heading">What is your full name?</div>
        <input aria-label="What is your full name?" type="text" required />
      </div>
      <div data-provider="google-forms">
        <div role="heading">Which session are you joining?</div>
        <label><input type="radio" name="session" value="Morning" />Morning</label>
        <label><input type="radio" name="session" value="Afternoon" />Afternoon</label>
      </div>
    </form>
    <script>var FB_PUBLIC_LOAD_DATA_ = [["Event RSVP"]];</script>
  </body>
</html>
